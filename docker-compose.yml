services:
  mcp-tavily:
    build: .
    container_name: mcp-tavily
    restart: always
    volumes:
      - ./.env:/app/.env
      - ./logs:/app/logs
    ports:
      - "18000:8000"
    environment:
      - TAVILY_API_KEYS=${TAVILY_API_KEYS}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      # Streamable HTTP 传输配置
      - MCP_HOST=0.0.0.0
      - PORT=8000
      - MCP_PATH=/mcp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
